name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# 同一ブランチの古い実行はキャンセルして無駄なランを避ける
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # ビルドは環境変数なし（デモモード）でも成功すること
          NEXT_TELEMETRY_DISABLED: "1"
